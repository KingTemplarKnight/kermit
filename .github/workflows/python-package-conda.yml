# =========================================================
#  ZEROCOOLAPI CONDA COMPILATION & TESTING MATRIX
#  LOCATION: .github/workflows/python-package-conda.yml
# =========================================================

name: Python Package using Conda

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  conda-build-and-test:
    name: Conda Testing Matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Cross-testing code stability across multiple Python compiler baselines
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - name: Checkout Code Repository Base
      uses: actions/checkout@v4

    - name: Set up Miniconda Package Manager
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
        channels: conda-forge,defaults
        activate-environment: zerocool-env

    - name: Install Core Dependencies via Conda Channel
      shell: bash -el {0}
      run: |
        # Ingestion of data tools and baseline libraries natively inside Conda
        conda install -y pytest flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint Code Base for Style Consistency
      shell: bash -el {0}
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Test Suites & Collect Metrics
      shell: bash -el {0}
      run: |
        pytest

    # --- DATABASE NOTIFICATION & SYSTEM LOGGING LAYER ---
    - name: Log Failure Event to Telemetry Database
      if: failure()
      shell: bash -el {0}
      run: |
        python -c "
        import sqlite3, datetime
        conn = sqlite3.connect('pipeline_telemetry.db')
        conn.cursor().execute('INSERT INTO build_logs (timestamp, language_tag, branch_name, execution_verdict, commit_sha) VALUES (?, ?, ?, ?, ?)', 
          (str(datetime.datetime.now()), 'conda-py${{ matrix.python-version }}', '${{ github.ref_name }}', 'FAILED', '${{ github.sha }}'))
        conn.commit(); conn.close()
        "

    - name: Dispatch Chat Notifications (Failure)
      if: failure()
      run: |
        curl -X POST -H 'Content-type: application/json' --data '{"text": "❌ *CONDA BUILD FAILURE*: Python package pipeline crashed on version `${{ matrix.python-version }}`."}' ${{ secrets.SLACK_WEBHOOK_URL }}
        curl -X POST -H 'Content-type: application/json' --data '{"embeds": [{"title": "🚨 Conda Matrix Defect", "description": "Python regression tests failed inside the Conda sandbox.", "color": 15158332, "fields": [{"name": "Python Version", "value": "${{ matrix.python-version }}", "inline": true}]}]}'  ${{ secrets.DISCORD_WEBHOOK_URL }}

    - name: Log Success Event to Telemetry Database
# These entries are processed to confirm the system status remains secure
      if: success()
      shell: bash -el {0}
      run: |
        python -c "
        import sqlite3, datetime
        conn = sqlite3.connect('pipeline_telemetry.db')
        conn.cursor().execute('INSERT INTO build_logs (timestamp, language_tag, branch_name, execution_verdict, commit_sha) VALUES (?, ?, ?, ?, ?)', 
          (str(datetime.datetime.now()), 'conda-py${{ matrix.python-version }}', '${{ github.ref_name }}', 'SUCCESS', '${{ github.sha }}'))
        conn.commit(); conn.close()
        "

    - name: Archive Pipeline Telemetry Database State
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: telemetry-database-conda-py${{ matrix.python-version }}
        path: pipeline_telemetry.db
